<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Generator Sertifikat PT SSI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to bottom right, #fff8e6, #f6e7c5);
    font-family: 'Segoe UI', sans-serif;
}
.mainbox { max-width: 700px; margin:auto; }
.card { border-radius:16px; border:none; }
.card-header {
    background:#d4af37;
    color:#fff;
    font-weight:600;
    border-radius:16px 16px 0 0;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="card p-4 shadow" style="width:350px;">
        <h4 class="text-center mb-3">🔐 Login</h4>

        <input type="text" id="username" class="form-control mb-3" placeholder="Username">
        <input type="password" id="password" class="form-control mb-3" placeholder="Password">

        <button onclick="login()" class="btn btn-primary w-100">Login</button>

        <div id="errorMsg" class="text-danger text-center mt-2" style="display:none;">
            Username / Password salah!
        </div>
    </div>
</div>

<div id="mainContent" style="display:none;">


<div class="container mainbox py-5">

    <!-- JUDUL -->
    <div class="text-center mb-4">
        <h3 class="fw-bold text-dark">
            <i class="bi bi-award-fill me-2"></i>
            Generator Sertifikat PT SSI
        </h3>
        
    </div>

    <!-- FORM -->
    <div class="card shadow-lg">
        <div class="card-header">
            Data Peserta
        </div>

        <div class="card-body p-4">

            <input id="pelatihan" class="form-control mb-3" placeholder="Nama Thema Pelatihan ">
            <input id="nama" class="form-control mb-3" placeholder="Nama Pegawai">
            <input id="npp" class="form-control mb-3" placeholder="NPP">

            <select id="region" class="form-select mb-3">
                <option value="">-- Pilih Region --</option>
                <option>1</option><option>2</option><option>3</option>
                <option>4</option><option>5</option>
            </select>

            <input id="unit" class="form-control mb-3" placeholder="Unit (contoh: TWU Bekasi)">

            <select id="jabatan" class="form-select mb-3">
                <option value="">-- Jabatan --</option>
                <option>GM</option>
                <option>Manager</option>
                <option>Supervisor</option>
                <option>Staff</option>
            </select>

            <input id="nilai" type="number" class="form-control mb-4" placeholder="Nilai (0-100)">

            <button onclick="generateSertifikat()" class="btn btn-success w-100 fw-bold">
                <i class="bi bi-printer-fill me-2"></i>
                Generate Sertifikat
            </button>

        </div>
    </div>

</div>

<script>


// 🔐 LOGIN DATA
const USER_LOGIN = "ptssi";
const PASS_LOGIN = "solid";

// LOGIN FUNCTION
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(user === USER_LOGIN && pass === PASS_LOGIN){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
    } else {
        document.getElementById("errorMsg").style.display = "block";
    }
}

 
let USER = {};

function generateNoSertifikat() {
    const now = new Date();
    const pad = n => n.toString().padStart(2, "0");

    const tanggal =
        now.getFullYear() +
        pad(now.getMonth() + 1) +
        pad(now.getDate());

    const jam =
        pad(now.getHours()) +
        pad(now.getMinutes()) +
        pad(now.getSeconds());

    const random5 = Math.floor(10000 + Math.random() * 90000);

    return `SSI/HCC/${tanggal}/${jam}/${random5}`;
}

function getTemaPelatihan() {
    const el = document.querySelector("h5.text-muted");
    return el ? el.innerText : "Program Pelatihan PT SSI";
}

function generateSertifikat(){

    USER.pelatihan = document.getElementById("pelatihan").value;
    USER.nama = document.getElementById("nama").value;
    USER.npp = document.getElementById("npp").value;
    USER.region = document.getElementById("region").value;
    USER.unit = document.getElementById("unit").value;
    USER.jabatan = document.getElementById("jabatan").value;
    USER.nilai = document.getElementById("nilai").value || 0;

    if(!USER.nama || !USER.npp){
        alert("Nama & NPP wajib diisi!");
        return;
    }

    const noSertifikat = generateNoSertifikat();
    
    const cert = `
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sertifikasi kelulusan </title>

<style>
@page {
    size: A4 landscape;
    margin: 0;
}

body {
    margin: 0;
    font-family: "Georgia", serif;
    background: #f8f8f8;
}

.certificate {
    width: 290mm; 
    height: 195mm; 
    padding: 20px;
    background: #fff;
    border: 18px solid #d4af37;
    outline: 6px double #b8963d;
    text-align: center;
    position: relative;
}

.no-sertifikat {
    position: absolute;
    top: 30px;
    right: 50px;
    font-size: 14px;
    color: #555;
}

.title {
    font-size: 50px;
    color: #b08a2e;
    font-weight: bold;
    letter-spacing: 4px;
    margin-top: 50px;
}

.subtitle {
    font-size: 18px;
    color: #555;
    margin-top: 12px;
    text-transform: capitalize;
}

.logo {
    position: absolute;
    top: 25px;
    left: 25px;
    
}

.logo img {
    width: 120px;
    height: 100px;
    object-fit: contain;
}

.line {
    width: 65%;
    height: 3px;
    background: linear-gradient(to right, transparent, #8b1e1e, transparent);
    margin: 30px auto;
}

.name {
    font-size: 52px;
    font-weight: bold;
    color: #7a5a18;
    margin: 30px 0;
    text-transform: uppercase;
}

.info {
    font-size: 20px;
    line-height: 1.9;
}

.score span {
    font-size: 38px;
    font-weight: bold;
    color: #b08a2e;
}

.footer {
    position: absolute;
    bottom: 30px;
    width: 100%;
    font-size: 14px;
    color: #666;
}
</style>
</head>

<body>

<div class="certificate">

    <div class="logo">
     <img src="logo.png" alt="PT SSI">
    </div>

    <div class="no-sertifikat">
        No Sertifikat : <b>${noSertifikat}</b>
    </div>

    <div class="title">SERTIFIKAT KELULUSAN</div>
    <div class="subtitle">${USER.pelatihan}</div>

    <div class="line"></div>

    <div class="info">Dengan ini menyatakan bahwa:</div>

    <div class="name">${USER.nama}</div>

    <div class="info">
        NPP : <b>${USER.npp}</b><br>
        Region : <b>${USER.region}</b><br>
        Jabatan : <b>${USER.jabatan}</b>
    </div>

    <div class="score">
        Dinyatakan <b>LULUS</b> dengan nilai akhir<br>
        <span>${USER.nilai}</span>
    </div>
    <div>
        <img src="ttd.png" alt="TTD GM HCC">
    </div>
    <div class="footer">
        Dokumen ini dicetak otomatis oleh Sistem Pelatihan Online PT SSI
    </div>

</div>

</body>
</html>
`;

    const win = window.open("");
    win.document.write(cert);
    win.document.close();

    setTimeout(()=>{
        win.print();
    },700);
}
</script>

</body>
</html>
