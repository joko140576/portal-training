<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Training</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #f1f5f9;
    font-family: 'Poppins', sans-serif;
}

/* CARD */
.card {
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    background: white;
}

/* LOADING */
#loadingOverlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.spinner {
    width: 60px;
    height: 60px;
    border: 6px solid #e2e8f0;
    border-top: 6px solid #0ea5e9;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingOverlay">
    <div>
        <div class="spinner"></div>
        <div class="mt-2 text-center">Memuat data...</div>
    </div>
</div>

<div class="container mt-4">

<div class="card p-4">

<h3 class="text-center mb-4">📊 Dashboard Training Pegawai</h3>

<!-- DROPDOWN GRAFIK -->
<div class="row mb-3">
    <div class="col-md-4">
        <select id="chartSelector" class="form-select">
            <option value="">-- Pilih Grafik --</option>
            <option value="Unit">COU</option>
            <option value="Region">Region</option>
            <option value="Jabatan">Jabatan</option>
        </select>
    </div>
</div>

<!-- GRAFIK -->
<div class="row mb-4">
    <div class="col-12">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<!-- SEARCH -->
<div class="mb-3 d-flex justify-content-between">
    <input type="text" id="searchInput" class="form-control w-50" placeholder="Cari Nama / NPP">
    <span id="totalData"></span>
</div>

<!-- TABLE -->
<div class="table-responsive">
<table class="table table-bordered table-striped" id="dataTable">
<thead class="table-dark">
<tr>
<th>Waktu Training</th>
<th>Nama</th>
<th>NPP</th>
<th>Region</th>
<th>Unit</th>
<th>Jabatan</th>
<th>Thema Training</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- PAGINATION -->
<nav>
<ul class="pagination justify-content-center" id="pagination"></ul>
</nav>

</div>
</div>

<script>

// 🔴 GANTI URL INI
const API_URL = "https://script.google.com/macros/s/AKfycbzAnY6I4RYjSD0Ay9vu-8BOqnTFfPbuRPNOmYgtdBxw7JSK3dw-Wi8JTH0V5wMO4YPt/exec";

let allData = [];
let currentPage = 1;
const rowsPerPage = 100;
let chartInstance = null;

// FETCH DATA
fetch(API_URL)
.then(res => res.json())
.then(data => {
    allData = data;

    renderTable(data);
    document.getElementById("totalData").innerText = "Total: " + data.length;

    document.getElementById("loadingOverlay").style.display = "none";
});


function formatTanggal(dateString) {
    const d = new Date(dateString);
    const day = String(d.getDate()).padStart(2, '0');
    const month = String(d.getMonth()+1).padStart(2, '0');
    const year = d.getFullYear();

    return `${day}/${month}/${year}`;
}

// RENDER TABLE
function renderTable(data) {
    const tbody = document.querySelector("#dataTable tbody");
    tbody.innerHTML = "";

    const start = (currentPage - 1) * rowsPerPage;
    const paginated = data.slice(start, start + rowsPerPage);

    paginated.forEach(item => {
        tbody.innerHTML += `
        <tr>
            <td>${formatTanggal(item["Waktu"])}</td>
            <td>${item["Nama"] || "-"}</td>
            <td>${item["NPP"] || "-"}</td>
            <td>${item["Region"] || "-"}</td>
            <td>${item["Unit"] || "-"}</td>
            <td>${item["Jabatan"] || "-"}</td>
            <td>${item["Training"] || "-"}</td>
        </tr>`;
    });

    setupPagination(data);
}

// PAGINATION
function setupPagination(data) {
    const pageCount = Math.ceil(data.length / rowsPerPage);
    const pagination = document.getElementById("pagination");
    pagination.innerHTML = "";

    for (let i = 1; i <= pageCount; i++) {
        pagination.innerHTML += `
        <li class="page-item ${i===currentPage?'active':''}">
            <button class="page-link" onclick="goPage(${i})">${i}</button>
        </li>`;
    }
}

function goPage(page) {
    currentPage = page;
    renderTable(allData);
}

// SEARCH
document.getElementById("searchInput").addEventListener("keyup", function() {
    const keyword = this.value.toLowerCase();

    const filtered = allData.filter(item =>
        (item["Nama"] || "").toLowerCase().includes(keyword) ||
        (item["NPP"] || "").toString().includes(keyword)
    );

    currentPage = 1;
    renderTable(filtered);
    document.getElementById("totalData").innerText = "Hasil: " + filtered.length;
});

// GROUP DATA
function groupData(data, key) {
    const result = {};
    data.forEach(item => {
        const val = item[key] || "Tidak ada";
        result[val] = (result[val] || 0) + 1;
    });
    return result;
}

// CHART
function createChart(label, dataObj) {
    const ctx = document.getElementById("mainChart");

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: Object.keys(dataObj),
            datasets: [{
                label: label,
                data: Object.values(dataObj),
                backgroundColor: [
                    '#38bdf8','#22c55e','#f59e0b','#ef4444','#8b5cf6'
                ]
            }]
        }
    });
}

// DROPDOWN CHART
document.getElementById("chartSelector").addEventListener("change", function() {
    const key = this.value;
    if (!key) return;

    const data = groupData(allData, key);
    createChart("Grafik " + key, data);
});

</script>

</body>
</html>
